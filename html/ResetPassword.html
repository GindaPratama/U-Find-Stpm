<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masukan Email - U-Find</title>
    <link rel="stylesheet" href="../css/ResetPassword.css" />
    <link rel="icon" href="../assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="reset-container">
      <!-- BRAND SECTION -->
      <div class="brand-section">
        <img
          src="../assets/img/logo_unikom.png"
          alt="Logo UNIKOM"
          class="logo"
        />
        <div class="brand-text">
          <h1>U-Find</h1>
          <p>TRUST UR HEART, TRUST U-Find</p>
        </div>
      </div>

      <!-- FORM SECTION -->
      <div class="form-section">
        <div class="reset-card">
          <div class="user-icon"><i class="fa-regular fa-circle-user"></i></div>
          <form action="ConfirmPassword.html" method="POST" novalidate>
            <div class="input-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Masukkan Email"
                required
              />
            </div>
            <div class="action-buttons">
              <a href="../index.html" class="btn-secondary">Kembali</a>
              <button type="submit" id="sendBtn" class="btn-primary">
                Kirim
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Modal Peringatan -->
    <div class="modal-overlay" id="warningModal">
      <div class="modal-box modal-box-warning">
        <div class="modal-icon-outline">
          <i class="fa-solid fa-exclamation"></i>
        </div>
        <h2 id="warningTitle">Peringatan</h2>
        <p id="warningMessage">Harap Masukan Email</p>
        <button type="button" class="modal-btn-primary" id="warningOkBtn">
          Oke
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/AdminAuth.js"></script>
    <script src="../js/ResetPassword.js"></script>
  </body>
</html>
