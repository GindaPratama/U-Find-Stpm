<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masukan Email - U-Find</title>
    <link rel="stylesheet" href="../css/ResetPassword.css" />
    <link rel="icon" href="../assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="reset-container">
      <div class="brand-section">
        <img
          src="../assets/img/logo_unikom.png"
          alt="Logo UNIKOM"
          class="logo"
        />
        <h1>U-Find</h1>
        <p>TRUST UR HEART, TRUST U-Find</p>
      </div>

      <div class="form-section">
        <div class="reset-card">
          <div class="user-icon">
            <i class="fa-regular fa-circle-user"></i>
          </div>

          <form action="ConfirmPassword.html" method="POST">
            <div class="input-group">
              <label for="email">Email UNIKOM</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Masukkan Email UNIKOM"
                required
              />
            </div>

            <div class="action-buttons">
              <a href="../index.html" class="btn-secondary">Kembali</a>
              <button type="submit" id="sendBtn" class="btn-primary">
                Kirim
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/ResetPassword.js"></script>
  </body>
</html>
