<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rekapitulasi Laporan - U-Find</title>
    <link rel="icon" href="../assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link rel="stylesheet" href="../css/AdminShared.css" />
    <link rel="stylesheet" href="../css/RekapitulasiLaporan.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <img src="../assets/img/logo_unikom.png" alt="Logo" class="nav-logo" />
        <span class="nav-title">U-Find</span>
      </div>
      <div class="nav-right">
        <div class="profile-menu">
          <button type="button" class="profile-trigger" id="profileTrigger">
            <span class="username">Pengguna</span>
            <i class="fa-solid fa-circle-user profile-icon"></i>
            <i class="fa-solid fa-chevron-down chevron-icon"></i>
          </button>
          <div class="profile-dropdown" id="profileDropdown">
            <a
              href="#"
              class="dropdown-item dropdown-item-danger"
              id="logoutBtn"
            >
              <i class="fa-solid fa-right-from-bracket"></i>
              <span>Keluar</span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <div class="main-container">
      <div class="tabs-container">
        <a href="DaftarValidasiLaporan.html" class="tab-btn"
          >Daftar Validasi Laporan</a
        >
        <a href="PemantauanStatus.html" class="tab-btn">Pemantauan Status</a>
        <a href="VerifikasiKlaim.html" class="tab-btn">Verifikasi Klaim</a>
        <a href="#" class="tab-btn active">Rekapitulasi Laporan</a>
      </div>

      <div class="rekap-wrapper">
        <h2 class="section-title text-center">Rekapitulasi Laporan</h2>

        <div class="rekap-grid">
          <div class="rekap-left">
            <div class="filter-date">
              <label>Pilih Periode Waktu</label>
              <div class="date-input-wrapper">
                <input type="date" id="tanggalMulai" />
                <span>-</span>
                <input type="date" id="tanggalSelesai" />
              </div>
              <button
                class="btn-download"
                id="btnTerapkan"
                style="margin-top: 8px"
              >
                Terapkan Filter <i class="fa-solid fa-filter"></i>
              </button>
            </div>

            <table class="rekap-table">
              <thead>
                <tr>
                  <th colspan="2" id="periodeLabel">Periode Waktu</th>
                </tr>
                <tr>
                  <th>Nama Laporan</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody id="rekapTableBody">
                <tr>
                  <td>Barang Hilang</td>
                  <td id="totalHilang">-</td>
                </tr>
                <tr>
                  <td>Barang Temuan</td>
                  <td id="totalTemuan">-</td>
                </tr>
                <tr>
                  <td>Barang Diklaim</td>
                  <td id="totalDiklaim">-</td>
                </tr>
              </tbody>
            </table>

            <button class="btn-download" id="btnUnduh">
              Unduh Laporan Rekap (CSV) <i class="fa-solid fa-download"></i>
            </button>
          </div>

          <div class="rekap-right">
            <div class="chart-container">
              <h4 id="periodeLabelChart">Periode Waktu</h4>
              <div class="chart-area">
                <div class="y-axis" id="yAxis"></div>
                <div class="bars" id="barsContainer"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/AdminAuth.js"></script>
    <script src="../js/RekapitulasiLaporan.js"></script>
  </body>
</html>
