<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - U-Find</title>
    <link rel="icon" href="../assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link rel="stylesheet" href="../css/Profile.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper">
      <header class="navbar">
        <div class="nav-left">
          <a href="../index.html">
            <img
              src="../assets/img/logo_unikom.png"
              alt="Logo UNIKOM"
              class="nav-logo"
            />
          </a>
          <span class="nav-title">U-Find</span>
        </div>
        <div class="nav-right">
          <div class="profile-menu">
            <button type="button" class="profile-trigger" id="profileTrigger">
              <span class="username">Pengguna</span>
              <i class="fa-solid fa-circle-user profile-icon"></i>
              <i class="fa-solid fa-chevron-down chevron-icon"></i>
            </button>

            <div class="profile-dropdown" id="profileDropdown">
              <a href="Profile.html" class="dropdown-item">
                <i class="fa-regular fa-user"></i>
                <span>Profil Saya</span>
              </a>
              <div class="dropdown-divider"></div>
              <a
                href="../index.html"
                class="dropdown-item dropdown-item-danger"
              >
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Keluar</span>
              </a>
            </div>
          </div>
        </div>
      </header>

      <main class="main-content">
        <div class="profile-card">
          <div class="profile-header">
            <i class="fa-solid fa-circle-user"></i>
            <div>
              <p class="name-top" id="profileNamaTop">Memuat...</p>
              <p class="role-top">Satpam</p>
            </div>
          </div>

          <div class="profile-info">
            <div class="info-group">
              <label>Nama</label>
              <p id="profileNama">-</p>
            </div>
            <div class="info-group">
              <label>NIP</label>
              <p id="profileNip">-</p>
            </div>
            <div class="info-group">
              <label>Shift</label>
              <p id="profileShift">-</p>
            </div>
            <div class="info-group">
              <label>Nomer Handphone</label>
              <p id="profileNoHp">-</p>
            </div>
            <div class="info-group">
              <label>Email</label>
              <p id="profileEmail">-</p>
            </div>
          </div>

          <div class="action-buttons">
            <a href="../index.html" class="btn-keluar" id="btnKeluar">Keluar</a>
            <a href="Dashboard.html" class="btn-kembali">Kembali</a>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/Profile.js"></script>
  </body>
</html>
