<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Satpam - U-Find</title>
    <link rel="icon" href="/assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link rel="stylesheet" href="/css/Dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper">
      <header class="navbar">
        <div class="nav-left">
          <a href="../index.html">
            <img
              src="../assets/img/logo_unikom.png"
              alt="Logo UNIKOM"
              class="nav-logo"
            />
          </a>
          <span class="nav-title">U-Find</span>
        </div>
        <div class="nav-right">
          <div class="profile-menu">
            <button type="button" class="profile-trigger" id="profileTrigger">
              <span class="username">Pengguna</span>
              <i class="fa-solid fa-circle-user profile-icon"></i>
              <i class="fa-solid fa-chevron-down chevron-icon"></i>
            </button>

            <div class="profile-dropdown" id="profileDropdown">
              <a href="Profile.html" class="dropdown-item">
                <i class="fa-regular fa-user"></i>
                <span>Profil Saya</span>
              </a>
              <div class="dropdown-divider"></div>
              <a
                href="../index.html"
                class="dropdown-item dropdown-item-danger"
              >
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Keluar</span>
              </a>
            </div>
          </div>
        </div>
      </header>

      <nav class="menu-bar">
        <a href="/html/DaftarValidasiLaporan.html" class="menu-bar-item"
          >Daftar Validasi Laporan</a
        >
        <a href="/html/PemantauanStatus.html" class="menu-bar-item"
          >Pemantauan Status</a
        >
        <a href="/html/VerifikasiKlaim.html" class="menu-bar-item"
          >Verifikasi Klaim</a
        >
        <a href="/html/RekapitulasiLaporan.html" class="menu-bar-item"
          >Rekapitulasi Laporan</a
        >
      </nav>

      <main class="main-content">
        <div class="dashboard-card">
          <div class="welcome-center">
            <img
              src="../assets/img/logo_unikom.png"
              alt="Logo UNIKOM Besar"
              class="welcome-logo-center"
            />
            <h1>Selamat datang di U-Find</h1>
            <p>TRUST UR HEART, TRUST U-Find</p>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/Dashboard.js"></script>
  </body>
</html>
