<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ubah Password - U-Find</title>
    <link rel="stylesheet" href="../css/ConfirmPassword.css" />
    <link rel="icon" href="../assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="reset-container">
      <!-- BRAND SECTION -->
      <div class="brand-section">
        <img
          src="../assets/img/logo_unikom.png"
          alt="Logo UNIKOM"
          class="logo"
        />
        <div class="brand-text">
          <h1>U-Find</h1>
          <p>TRUST UR HEART, TRUST U-Find</p>
        </div>
      </div>

      <!-- FORM SECTION -->
      <div class="form-section">
        <div class="reset-card">
          <div class="user-icon"></div>
          <form action="../index.html" method="POST" novalidate>
            <div class="input-group">
              <label for="new_password">Password Baru</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="new_password"
                  name="new_password"
                  placeholder="Masukkan Password Baru"
                  required
                />
                <i
                  class="fa-regular fa-eye toggle-password"
                  data-target="new_password"
                ></i>
              </div>
            </div>
            <div class="input-group">
              <label for="confirm_password">Konfirmasi Password</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="confirm_password"
                  name="confirm_password"
                  placeholder="Masukkan Konfirmasi Password"
                  required
                />
                <i
                  class="fa-regular fa-eye toggle-password"
                  data-target="confirm_password"
                ></i>
              </div>
            </div>
            <div class="action-buttons">
              <a href="ResetPassword.html" class="btn-secondary">Kembali</a>
              <button type="submit" class="btn-primary">Kirim</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Modal Peringatan -->
    <div class="modal-overlay" id="warningModal">
      <div class="modal-box">
        <div class="modal-icon-outline">
          <i class="fa-solid fa-exclamation"></i>
        </div>
        <h2 id="warningTitle">Peringatan</h2>
        <p id="warningMessage">
          Mohon lengkapi data atau pastikan konfirmasi password benar
        </p>
        <button type="button" class="modal-btn-primary" id="warningOkBtn">
          Ok
        </button>
      </div>
    </div>

    <!-- Modal Sukses -->
    <div class="modal-overlay" id="successModal">
      <div class="modal-box">
        <div class="modal-icon-outline success-icon">
          <i class="fa-solid fa-check"></i>
        </div>
        <h2>Berhasil</h2>
        <p>Password berhasil diubah</p>
        <button type="button" class="modal-btn-primary" id="successOkBtn">
          Ya
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/AdminAuth.js"></script>
    <script src="../js/ConfirmPassword.js"></script>
  </body>
</html>
